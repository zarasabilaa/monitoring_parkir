<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Monitoring Parkir</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTML5 QR Code -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <!-- Face API (tetap dipakai sesuai instruksi dosen) -->
  <script defer src="/static/js/face-api.min.js"></script>
</head>

<body class="bg-slate-100">

  <!-- NAVBAR -->
  <nav class="bg-indigo-700 text-white p-4 flex justify-between items-center">
    <div class="text-xl font-bold">🅿️ Monitoring Parkir</div>
    <button onclick="resetSystem()" 
            class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded font-semibold text-sm">
      🔄 Reset
    </button>
  </nav>

  <!-- MAIN GRID -->
  <div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- SCAN -->
    <div class="bg-white p-4 rounded shadow">
      <div id="reader"></div>
      <div id="scan-res" class="mt-3 text-center font-bold"></div>
      <canvas id="canvas" class="hidden"></canvas>
    </div>

    <!-- SLOT -->
    <div class="lg:col-span-2 bg-white p-4 rounded shadow">
      <h2 class="font-bold mb-3">Status Slot</h2>
      <div id="slot-grid" class="grid grid-cols-5 gap-2"></div>
    </div>

    <!-- LOG -->
    <div class="lg:col-span-3 bg-white p-4 rounded shadow">
      <h2 class="font-bold mb-3">Riwayat Parkir</h2>
      <table class="w-full text-sm text-center">
        <thead class="bg-slate-200">
          <tr>
            <th>Nama</th>
            <th>NPM</th>
            <th>Slot</th>
            <th>Masuk</th>
            <th>Keluar</th>
            <th>Durasi</th>
            <th>Status</th>
            <th>Foto</th>
          </tr>
        </thead>
        <tbody id="log-table"></tbody>
      </table>
    </div>

  </div>

  <!-- AUDIO -->
  <audio id="beep" src="/static/beep.mp3"></audio>

  <!-- SCRIPT -->
  <script>
    /* ================= CAPTURE FOTO DARI KAMERA QR ================= */
    function capturePhotoFromQR() {
      const video = document.querySelector("#reader video");
      if (!video) return null;
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      return canvas.toDataURL("image/jpeg");
    }

    /* ================= LOAD DATA SLOT ================= */
    function loadSlots() {
      fetch('/api/slots')
        .then(r => r.json())
        .then(d => {
          document.getElementById('slot-grid').innerHTML = d.map(s => `
            <div class="p-3 rounded text-white font-bold text-center ${s.status === 'TERISI' ? 'bg-red-600' : 'bg-green-600'}">
              ${s.slot}
            </div>
          `).join('');
        });
    }

    /* ================= LOAD DATA LOG ================= */
    function loadLogs() {
      fetch('/get_logs')
        .then(r => r.json())
        .then(d => {
          document.getElementById('log-table').innerHTML = d.map(l => `
            <tr class="border-b">
              <td>${l.nama}</td>
              <td>${l.npm_display}</td>
              <td>${l.slot}</td>
              <td>${l.waktu_masuk}</td>
              <td>${l.waktu_keluar}</td>
              <td>${l.duration}</td>
              <td>${l.status}</td>
              <td>
                ${l.foto ? `<img src="${l.foto}" class="h-14 w-14 object-cover rounded mx-auto border">` : '-'}
              </td>
            </tr>
          `).join('');
        });
    }

    /* ================= QR SCANNER ================= */
    let processing = false;
    async function onScanSuccess(txt) {
      if (processing) return;
      processing = true;

      const foto = capturePhotoFromQR();
      fetch('/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ npm: txt, foto: foto })
      })
      .then(r => r.json())
      .then(res => {
        document.getElementById('scan-res').innerText = `${res.nama} → ${res.type} (${res.slot})`;
        document.getElementById("beep").play();
        loadSlots();
        loadLogs();
        setTimeout(() => processing = false, 2000);
      });
    }

    new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 })
      .render(onScanSuccess);

    /* ================= AUTO REFRESH DATA ================= */
    setInterval(() => {
      loadSlots();
      loadLogs();
    }, 3000);

    loadSlots();
    loadLogs();

    /* ================= RESET SYSTEM ================= */
    function resetSystem() {
      if (!confirm("Reset semua data parkir?")) return;
      fetch('/reset', { method: 'POST' })
        .then(r => r.json())
        .then(res => {
          alert(res.message);
          location.reload();
        });
    }
  </script>

</body>
</html>
